<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Infaq Bersama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        ::-webkit-scrollbar { display: none; }
        .pb-safe { padding-bottom: 110px; }
        .tab-content { display: none; animation: fadeIn 0.2s ease-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .modal-overlay { backdrop-filter: blur(8px); background-color: rgba(15, 23, 42, 0.6); }
        .no-select { -webkit-user-select: none; user-select: none; pointer-events: none; }
        
        /* Modifikasi SweetAlert agar cocok dengan tema FOUNDERLAN */
        div:where(.swal2-container) button:where(.swal2-styled).swal2-confirm { background-color: #0d9488 !important; border-radius: 12px; font-family: 'Plus Jakarta Sans'; font-weight: bold; }
        div:where(.swal2-container) button:where(.swal2-styled).swal2-cancel { background-color: #f1f5f9 !important; color: #475569 !important; border-radius: 12px; font-family: 'Plus Jakarta Sans'; font-weight: bold; }
        div:where(.swal2-container) div:where(.swal2-popup) { border-radius: 24px; font-family: 'Plus Jakarta Sans'; }
    </style>
</head>
<body class="max-w-md mx-auto bg-white min-h-screen relative flex flex-col shadow-2xl">

    <div id="login-screen" class="flex-grow flex flex-col items-center justify-center px-8 bg-gradient-to-br from-teal-600 to-emerald-800 text-white">
        <div class="w-24 h-24 bg-white/20 rounded-3xl backdrop-blur-md flex items-center justify-center mb-6 shadow-xl border border-white/30">
            <i class="fas fa-user-shield text-4xl"></i>
        </div>
        <h1 class="text-2xl font-black mb-1">FOUNDERLAN</h1>
        <p class="text-teal-100 text-xs font-bold uppercase tracking-widest mb-10">Admin Dashboard</p>
        
        <div class="w-full space-y-4">
            <div class="relative">
                <i class="fas fa-user absolute left-4 top-4 text-teal-200"></i>
                <input type="text" id="user" placeholder="Username" class="w-full bg-white/10 border border-white/20 rounded-2xl py-4 pl-12 pr-4 text-white placeholder-white/50 focus:outline-none focus:bg-white/20 transition-all font-bold">
            </div>
            <div class="relative">
                <i class="fas fa-lock absolute left-4 top-4 text-teal-200"></i>
                <input type="password" id="pass" placeholder="Password" class="w-full bg-white/10 border border-white/20 rounded-2xl py-4 pl-12 pr-4 text-white placeholder-white/50 focus:outline-none focus:bg-white/20 transition-all font-bold">
            </div>
            <button onclick="prosesLogin()" id="btn-login" class="w-full bg-white text-teal-800 font-black py-4 rounded-2xl shadow-lg hover:bg-teal-50 transition-all transform active:scale-95 uppercase tracking-wider text-sm">Masuk Sistem</button>
        </div>
    </div>

    <div id="admin-screen" class="hidden flex-grow flex flex-col bg-slate-50">
        <header class="bg-white px-5 py-4 flex justify-between items-center border-b border-slate-100 sticky top-0 z-30">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-teal-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-teal-100">
                    <i class="fas fa-crown"></i>
                </div>
                <div>
                    <h2 class="text-sm font-black text-slate-800 leading-none" id="display-name">Admin</h2>
                    <span class="text-[10px] font-bold text-teal-600 uppercase tracking-tighter" id="display-role">Level</span>
                </div>
            </div>
            <button onclick="logout()" class="w-10 h-10 rounded-xl bg-red-50 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all">
                <i class="fas fa-power-off"></i>
            </button>
        </header>

        <main class="flex-grow px-5 pt-6 pb-safe overflow-y-auto">
            <div id="tab-dashboard" class="tab-content active space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Total Saldo</p>
                        <h3 id="total-saldo-all" class="text-lg font-black text-slate-900 tracking-tight">Rp 0</h3>
                    </div>
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Donatur</p>
                        <h3 id="total-donatur" class="text-lg font-black text-slate-900 tracking-tight">0 Org</h3>
                    </div>
                </div>
                <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
                    <h4 class="text-xs font-black text-slate-800 uppercase mb-4 flex items-center gap-2">
                        <i class="fas fa-history text-teal-500"></i> Log Sistem
                    </h4>
                    <div id="list-logs" class="space-y-4 max-h-60 overflow-y-auto pr-1"></div>
                </div>
            </div>

            <div id="tab-program" class="tab-content space-y-4">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="font-black text-slate-800">Manajemen Program</h3>
                    <button onclick="bukaModalProgram('tambah')" class="bg-teal-600 text-white text-[10px] font-black px-4 py-2 rounded-xl shadow-lg shadow-teal-100 uppercase tracking-wider">+ Program</button>
                </div>
                <div id="list-program-admin" class="space-y-3"></div>
            </div>

            <div id="tab-donasi" class="tab-content space-y-4">
                <h3 class="font-black text-slate-800 mb-2">Verifikasi Donasi</h3>
                <div id="list-donasi-admin" class="space-y-3"></div>
            </div>

            <div id="tab-user" class="tab-content space-y-4">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="font-black text-slate-800">Manajemen Admin</h3>
                    <button onclick="bukaModalUser()" class="bg-emerald-600 text-white text-[10px] font-black px-4 py-2 rounded-xl shadow-lg uppercase tracking-wider">+ Admin Baru</button>
                </div>
                <div id="list-user-admin" class="space-y-3"></div>
            </div>

            <div id="tab-profil" class="tab-content space-y-6">
                <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 text-center">
                    <div class="w-20 h-20 bg-teal-100 text-teal-600 rounded-3xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-inner">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <h3 id="prof-user" class="font-black text-slate-800 text-xl leading-none mb-1">Username</h3>
                    <p id="prof-role" class="text-xs font-bold text-teal-600 uppercase">Role</p>
                </div>

                <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                    <h4 class="text-sm font-black text-slate-800 mb-5 flex items-center gap-2">
                        <i class="fas fa-key text-amber-500"></i> Ubah Password
                    </h4>
                    <div class="space-y-4">
                        <input type="password" id="pass-lama" placeholder="Password Sekarang" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-xs font-bold focus:outline-none focus:ring-2 focus:ring-teal-500">
                        <input type="password" id="pass-baru" placeholder="Password Baru" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-xs font-bold focus:outline-none focus:ring-2 focus:ring-teal-500">
                        <button onclick="prosesUbahPassword()" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl text-xs uppercase tracking-widest hover:bg-black transition-all">Simpan Perubahan</button>
                    </div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-md bg-white/90 backdrop-blur-md border-t border-slate-100 flex justify-around items-center pt-3 pb-6 px-2 z-40 rounded-t-[35px] shadow-[0_-10px_40px_-10px_rgba(0,0,0,0.1)]">
            <button onclick="switchTab('dashboard', this)" class="admin-nav flex flex-col items-center gap-1 text-teal-600 transition w-14">
                <div class="icon-bg bg-teal-50 p-2 rounded-2xl"><i class="fas fa-chart-bar text-lg"></i></div>
                <span class="text-[9px] font-black uppercase">Home</span>
            </button>
            <button onclick="switchTab('program', this)" class="admin-nav flex flex-col items-center gap-1 text-slate-400 transition w-14">
                <div class="icon-bg p-2"><i class="fas fa-tasks text-lg"></i></div>
                <span class="text-[9px] font-bold uppercase">Program</span>
            </button>
            <button onclick="switchTab('donasi', this)" class="admin-nav flex flex-col items-center gap-1 text-slate-400 transition w-14">
                <div class="icon-bg p-2"><i class="fas fa-check-double text-lg"></i></div>
                <span class="text-[9px] font-bold uppercase">Donasi</span>
            </button>
            <button id="nav-user" onclick="switchTab('user', this)" class="hidden admin-nav flex flex-col items-center gap-1 text-slate-400 transition w-14">
                <div class="icon-bg p-2"><i class="fas fa-users-cog text-lg"></i></div>
                <span class="text-[9px] font-bold uppercase">User</span>
            </button>
            <button onclick="switchTab('profil', this)" class="admin-nav flex flex-col items-center gap-1 text-slate-400 transition w-14">
                <div class="icon-bg p-2"><i class="fas fa-user-circle text-lg"></i></div>
                <span class="text-[9px] font-bold uppercase">Profil</span>
            </button>
        </nav>
    </div>

    <div id="modal-program" class="fixed inset-0 bg-slate-900/60 z-50 hidden flex items-center justify-center px-4">
        <div class="bg-white w-full max-w-sm rounded-[30px] p-6 shadow-2xl relative">
            <h3 id="modal-prog-title" class="text-sm font-black text-slate-800 mb-4">Tambah Program</h3>
            <div class="space-y-3">
                <input type="hidden" id="prog-id"><input type="hidden" id="prog-mode"><input type="hidden" id="prog-foto-lama">
                <input type="text" id="prog-nama" placeholder="Nama Program" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs font-bold">
                <input type="text" id="prog-target" placeholder="Target Dana (Rp)" oninput="formatRupiahInput(this)" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs font-bold">
                <input type="text" id="prog-bank" placeholder="Nama Bank (mis: BSI)" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs font-bold">
                <input type="number" id="prog-norek" placeholder="Nomor Rekening" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs font-bold">
                <input type="text" id="prog-atasnama" placeholder="Atas Nama Rekening" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs font-bold">
                
                <div class="border-2 border-dashed border-slate-200 rounded-xl p-3 text-center relative hover:bg-slate-50 transition">
                    <input type="file" id="prog-foto" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept="image/*">
                    <i class="fas fa-image text-slate-400 text-xl mb-1"></i>
                    <p class="text-[10px] font-bold text-slate-500">Upload Poster Baru</p>
                </div>
                <div class="flex gap-2 mt-4">
                    <button onclick="document.getElementById('modal-program').classList.add('hidden')" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl text-xs">Batal</button>
                    <button onclick="simpanProgram()" id="btn-simpan-prog" class="flex-1 bg-teal-600 text-white font-bold py-3 rounded-xl text-xs shadow-lg">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-donasi" class="fixed inset-0 bg-slate-900/60 z-50 hidden flex items-center justify-center px-4">
        <div class="bg-white w-full max-w-sm rounded-[30px] p-6 shadow-2xl relative">
            <h3 class="text-sm font-black text-slate-800 mb-4">Edit Data Donasi</h3>
            <div class="space-y-3">
                <input type="hidden" id="donasi-nama-lama"><input type="hidden" id="donasi-nominal-lama"><input type="hidden" id="donasi-program-lama">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 ml-1">Nama Donatur</label>
                    <input type="text" id="donasi-nama-baru" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs font-bold mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 ml-1">Wilayah/Alamat</label>
                    <input type="text" id="donasi-wilayah-baru" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs font-bold mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 ml-1">Nominal (Rp)</label>
                    <input type="text" id="donasi-nominal-baru" oninput="formatRupiahInput(this)" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs font-bold mt-1">
                </div>
                <div class="flex gap-2 mt-4">
                    <button onclick="document.getElementById('modal-donasi').classList.add('hidden')" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl text-xs">Batal</button>
                    <button onclick="simpanEditDonasi()" id="btn-simpan-donasi" class="flex-1 bg-teal-600 text-white font-bold py-3 rounded-xl text-xs shadow-lg">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-preview" class="fixed inset-0 z-[100] hidden flex items-center justify-center px-6">
        <div class="modal-overlay absolute inset-0" onclick="tutupPreview()"></div>
        <div class="bg-white w-full max-w-sm rounded-[40px] overflow-hidden shadow-2xl relative animate-[fadeIn_0.3s_ease-out]">
            <div class="p-5 flex justify-between items-center border-b border-slate-100">
                <h4 class="font-black text-slate-800 text-sm">Bukti Transfer</h4>
                <button onclick="tutupPreview()" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center"><i class="fas fa-times text-xs"></i></button>
            </div>
            <div class="p-4 bg-slate-50 relative group">
                <div class="no-select flex justify-center items-center min-h-[300px]">
                    <img id="img-preview" src="" class="max-w-full max-h-[70vh] rounded-2xl shadow-md border-4 border-white pointer-events-none" oncontextmenu="return false;" ondragstart="return false;">
                </div>
                <div class="absolute inset-0 flex items-center justify-center opacity-10 pointer-events-none select-none">
                    <span class="text-4xl font-black rotate-45 text-slate-900 uppercase">FOUNDERLAN SECURE</span>
                </div>
            </div>
            <div class="p-4 text-center">
                <p class="text-[10px] font-bold text-slate-400">Klik luar gambar untuk menutup</p>
            </div>
        </div>
    </div>

    <script>
        // URL WEB APP TERBARU HARAP PASTIKAN DEPLOY BARU KALAU UDAH UBAH CODE.GS
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbxlsnAeKUnicG1J_JHH576byKCejUtA5TqX3tAKWtoJz7Fw1VetPE8dpNjkrc8zqkJn/exec';
        let currentUser = null; let currentRole = null;
        const formatRupiah = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });

        function formatRupiahInput(input) { let value = input.value.replace(/[^0-9]/g, ''); input.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function formatRupiahInputManual(angka) { return angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }

        // --- CORE LOGIN ---
        function prosesLogin() {
            const user = document.getElementById('user').value; const pass = document.getElementById('pass').value;
            if(!user || !pass) return Swal.fire({ icon: 'warning', title: 'Oops...', text: 'Username & password wajib diisi!'});
            
            const btn = document.getElementById('btn-login'); btn.disabled = true; btn.innerText = "Mengecek Kredensial...";
            
            fetch(scriptUrl, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "login", user: user, pass: pass }) })
            .then(r => r.json()).then(res => {
                if(res.status === 'success') {
                    currentUser = user; currentRole = res.role;
                    document.getElementById('login-screen').classList.add('hidden'); document.getElementById('admin-screen').classList.remove('hidden');
                    document.getElementById('display-name').innerText = user; document.getElementById('display-role').innerText = res.role;
                    document.getElementById('prof-user').innerText = user; document.getElementById('prof-role').innerText = res.role;
                    if(res.role.toLowerCase() === 'superadmin') document.getElementById('nav-user').classList.remove('hidden');
                    Swal.fire({ icon: 'success', title: 'Selamat Datang!', text: `Anda login sebagai ${res.role}`, timer: 1500, showConfirmButton: false });
                    memuatSemuaData();
                } else Swal.fire({ icon: 'error', title: 'Login Gagal', text: 'Kredensial tidak valid.'});
            }).catch(() => Swal.fire({ icon: 'error', title: 'Koneksi Gagal', text: 'Cek koneksi internet / update web app URL.'})).finally(() => { btn.disabled = false; btn.innerText = "Masuk Sistem"; });
        }

        // --- MANAJEMEN DATA UTAMA ---
        function memuatSemuaData() {
            fetch(scriptUrl + "?action=getProgram").then(r => r.json()).then(data => {
                document.getElementById('total-saldo-all').innerText = formatRupiah.format(data.reduce((sum, p) => sum + Number(p.terkumpul), 0));
                document.getElementById('list-program-admin').innerHTML = data.map(p => `
                    <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex items-center gap-4">
                        <div class="w-16 h-16 bg-slate-100 rounded-2xl overflow-hidden shadow-inner flex-shrink-0"><img src="https://drive.google.com/thumbnail?id=${p.foto}&sz=w200" class="w-full h-full object-cover"></div>
                        <div class="flex-grow">
                            <h4 class="text-xs font-black text-slate-800 leading-tight mb-1">${p.nama}</h4>
                            <div class="flex justify-between items-center"><span class="text-[10px] font-bold text-teal-600">${formatRupiah.format(p.terkumpul)}</span>
                                <div class="flex gap-2">
                                    <button onclick="bukaModalProgram('edit', '${p.id}', '${p.nama}', '${p.target}', '${p.bank}', '${p.norek}', '${p.atas_nama}', '${p.foto}')" class="text-teal-400 p-1 hover:text-teal-600"><i class="fas fa-edit text-[10px]"></i></button>
                                    <button onclick="hapusProgram('${p.nama}')" class="text-red-400 p-1 hover:text-red-600"><i class="fas fa-trash-alt text-[10px]"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            });

            fetch(scriptUrl + "?action=getDonasi").then(r => r.json()).then(data => {
                document.getElementById('total-donatur').innerText = data.length + " Org";
                document.getElementById('list-donasi-admin').innerHTML = data.reverse().slice(0, 30).map(d => `
                    <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center">
                        <div class="flex items-center gap-3"><div class="w-10 h-10 bg-teal-50 text-teal-600 rounded-xl flex items-center justify-center text-xs shadow-inner"><i class="fas fa-user"></i></div>
                            <div><h4 class="text-xs font-black text-slate-800">${d.nama}</h4><p class="text-[9px] font-bold text-slate-400">${d.program}</p></div>
                        </div>
                        <div class="text-right flex items-center gap-2">
                            <div class="mr-1"><p class="text-xs font-black text-teal-600">${formatRupiah.format(d.nominal)}</p><button onclick="bukaPreview('${d.struk}')" class="text-[9px] font-black text-amber-500 uppercase tracking-tighter underline">Cek Struk</button></div>
                            <button onclick="bukaModalEditDonasi('${d.nama}', '${d.wilayah}', '${d.nominal}', '${d.program}')" class="text-blue-400 p-1.5 hover:text-blue-600"><i class="fas fa-edit"></i></button>
                            <button onclick="hapusDonasi('${d.nama}', ${d.nominal})" class="text-red-300 p-1.5 hover:text-red-500"><i class="fas fa-times-circle"></i></button>
                        </div>
                    </div>
                `).join('');
            });

            fetch(scriptUrl + "?action=getLogs").then(r => r.json()).then(data => {
                document.getElementById('list-logs').innerHTML = data.slice(0, 15).map(l => `<div class="border-l-2 border-teal-100 pl-3 py-1"><p class="text-[10px] font-bold text-slate-800 leading-tight">${l.aktivitas}</p><p class="text-[8px] font-bold text-slate-400 mt-0.5">${l.user} • ${new Date(l.waktu).toLocaleTimeString()}</p></div>`).join('');
            });

            if(currentRole.toLowerCase() === 'superadmin') loadAdminList();
        }

        // --- CRUD PROGRAM ---
        function bukaModalProgram(mode, id='', nama='', target='', bank='', norek='', an='', fotoLama='') {
            document.getElementById('prog-mode').value = mode; document.getElementById('prog-id').value = id; document.getElementById('prog-nama').value = nama; document.getElementById('prog-target').value = target ? formatRupiahInputManual(target) : ''; document.getElementById('prog-bank').value = bank; document.getElementById('prog-norek').value = norek; document.getElementById('prog-atasnama').value = an; document.getElementById('prog-foto-lama').value = fotoLama;
            document.getElementById('modal-prog-title').innerText = mode === 'tambah' ? 'Tambah Program Baru' : 'Edit Program'; document.getElementById('modal-program').classList.remove('hidden');
        }

        function simpanProgram() {
            const btn = document.getElementById('btn-simpan-prog'); const targetVal = document.getElementById('prog-target').value.replace(/\./g, '');
            let payload = { action: "simpan_program", admin: currentUser, mode: document.getElementById('prog-mode').value, id_program: document.getElementById('prog-id').value, nama: document.getElementById('prog-nama').value, target: targetVal, bank: document.getElementById('prog-bank').value, norek: document.getElementById('prog-norek').value, atas_nama: document.getElementById('prog-atasnama').value, foto_lama: document.getElementById('prog-foto-lama').value };
            if(!payload.nama || !payload.target) return Swal.fire('Error', 'Nama dan Target wajib diisi!', 'error');
            btn.disabled = true; btn.innerText = "Menyimpan...";

            const fileInput = document.getElementById('prog-foto');
            if (fileInput.files.length > 0) {
                const reader = new FileReader(); reader.onload = function(e) { payload.file_base64 = e.target.result; payload.mime_type = fileInput.files[0].type; kirimDataProgram(payload, btn); }; reader.readAsDataURL(fileInput.files[0]);
            } else kirimDataProgram(payload, btn);
        }

        function kirimDataProgram(payload, btn) {
            fetch(scriptUrl, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) })
            .then(r => r.json()).then(res => { if(res.status === 'success') { document.getElementById('modal-program').classList.add('hidden'); Swal.fire('Tersimpan', 'Data program berhasil disimpan.', 'success'); memuatSemuaData(); } else Swal.fire('Error', 'Gagal menyimpan program.', 'error'); }).finally(() => { btn.disabled = false; btn.innerText = "Simpan"; });
        }

        function hapusProgram(n) { 
            Swal.fire({ title: 'Hapus Program?', text: `Yakin menghapus program ${n}?`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#cbd5e1', confirmButtonText: 'Ya, Hapus!' })
            .then((result) => { if (result.isConfirmed) { fetch(scriptUrl, { method:"POST", body: JSON.stringify({action:"hapus_program", nama_program:n, admin:currentUser}) }).then(()=>{ Swal.fire('Terhapus!', 'Program telah dihapus.', 'success'); memuatSemuaData(); }); } });
        }
        
        // --- FITUR EDIT & HAPUS DONASI ---
        function bukaModalEditDonasi(nama, wilayah, nominal, program) {
            document.getElementById('donasi-nama-lama').value = nama; document.getElementById('donasi-nominal-lama').value = nominal; document.getElementById('donasi-program-lama').value = program; document.getElementById('donasi-nama-baru').value = nama; document.getElementById('donasi-wilayah-baru').value = wilayah; document.getElementById('donasi-nominal-baru').value = formatRupiahInputManual(nominal); document.getElementById('modal-donasi').classList.remove('hidden');
        }

        function simpanEditDonasi() {
            const btn = document.getElementById('btn-simpan-donasi'); const nominalBaruVal = document.getElementById('donasi-nominal-baru').value.replace(/\./g, '');
            let payload = { action: "edit_donasi", admin: currentUser, nama_lama: document.getElementById('donasi-nama-lama').value, nominal_lama: document.getElementById('donasi-nominal-lama').value, program_lama: document.getElementById('donasi-program-lama').value, nama_baru: document.getElementById('donasi-nama-baru').value, wilayah_baru: document.getElementById('donasi-wilayah-baru').value, nominal_baru: nominalBaruVal };
            if(!payload.nama_baru || !payload.nominal_baru) return Swal.fire('Error', 'Semua form wajib diisi!', 'error');
            btn.disabled = true; btn.innerText = "Menyimpan...";

            fetch(scriptUrl, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) })
            .then(r => r.json()).then(res => { if(res.status === 'success') { document.getElementById('modal-donasi').classList.add('hidden'); Swal.fire('Tersimpan!', 'Donasi berhasil diedit.', 'success'); memuatSemuaData(); } else Swal.fire('Error', 'Gagal menyimpan.', 'error'); }).finally(() => { btn.disabled = false; btn.innerText = "Simpan"; });
        }

        function hapusDonasi(n, m) { 
            Swal.fire({ title: 'Hapus Donasi?', text: "Saldo program akan otomatis dikurangi.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#cbd5e1', confirmButtonText: 'Ya, Hapus!' })
            .then((result) => { if (result.isConfirmed) { fetch(scriptUrl, { method:"POST", body: JSON.stringify({action:"hapus_donasi", nama:n, nominal:m, admin:currentUser}) }).then(()=>{ Swal.fire('Terhapus!', 'Data donasi dihapus.', 'success'); memuatSemuaData(); }); } });
        }

        // --- FITUR PREVIEW PREMIUM ---
        function bukaPreview(url) { let driveId = url.includes('id=') ? url.split('id=')[1] : url; document.getElementById('img-preview').src = `https://drive.google.com/thumbnail?id=${driveId}&sz=w1000`; document.getElementById('modal-preview').classList.remove('hidden'); }
        function tutupPreview() { document.getElementById('modal-preview').classList.add('hidden'); }

        // --- FITUR UBAH PASSWORD DIRI SENDIRI ---
        function prosesUbahPassword() {
            const pLama = document.getElementById('pass-lama').value; const pBaru = document.getElementById('pass-baru').value;
            if(!pLama || !pBaru) return Swal.fire('Oops!', 'Isi kolom password!', 'warning');
            Swal.fire({ title: 'Ganti Password?', text: "Anda akan diminta login ulang.", icon: 'warning', showCancelButton: true, confirmButtonText: 'Ya, Ubah!' }).then((res) => {
                if(res.isConfirmed) {
                    fetch(scriptUrl, { method: "POST", body: JSON.stringify({ action: "ubah_password", user: currentUser, passLama: pLama, passBaru: pBaru }) })
                    .then(r => r.json()).then(r => { if(r.status === 'success') { Swal.fire('Sukses!', 'Silakan login kembali.', 'success').then(()=>logout()); } else Swal.fire('Error', r.message, 'error'); });
                }
            });
        }

        // --- MANAJEMEN USER (SUPERADMIN) ---
        function loadAdminList() {
            fetch(scriptUrl + "?action=getAdmins").then(r => r.json()).then(data => {
                document.getElementById('list-user-admin').innerHTML = data.map(u => `
                    <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center">
                        <div class="flex items-center gap-3"><div class="w-10 h-10 bg-slate-100 text-slate-400 rounded-xl flex items-center justify-center"><i class="fas fa-id-badge"></i></div>
                            <div><h4 class="text-xs font-black text-slate-800">${u.username}</h4><span class="text-[9px] font-bold text-teal-600 uppercase tracking-widest">${u.role}</span></div>
                        </div>
                        ${u.username !== currentUser ? `
                        <div class="flex gap-2">
                            <button onclick="resetPasswordUser('${u.username}')" class="text-amber-400 p-2 hover:text-amber-600"><i class="fas fa-key"></i></button>
                            <button onclick="hapusUser('${u.username}')" class="text-red-400 p-2 hover:text-red-600"><i class="fas fa-trash-alt"></i></button>
                        </div>` : ''}
                    </div>
                `).join('');
            });
        }

        // POP-UP ESTETIK UNTUK TAMBAH ADMIN
        async function bukaModalUser() {
            const { value: formValues } = await Swal.fire({
                title: 'Tambah Admin Baru',
                html:
                    '<input id="swal-user" class="swal2-input text-sm rounded-xl" placeholder="Username">' +
                    '<input id="swal-pass" class="swal2-input text-sm rounded-xl" type="password" placeholder="Password">' +
                    '<select id="swal-role" class="swal2-input text-sm rounded-xl"><option value="Admin">Admin</option><option value="Superadmin">Superadmin</option></select>',
                focusConfirm: false, showCancelButton: true, confirmButtonText: 'Simpan',
                preConfirm: () => { return [ document.getElementById('swal-user').value, document.getElementById('swal-pass').value, document.getElementById('swal-role').value ] }
            });
            if (formValues) {
                const [userBaru, passBaru, roleBaru] = formValues;
                if(!userBaru || !passBaru) return Swal.fire('Error', 'Data belum lengkap!', 'error');
                fetch(scriptUrl, { method: "POST", body: JSON.stringify({ action: "tambah_admin", admin: currentUser, userBaru: userBaru, passBaru: passBaru, roleBaru: roleBaru }) })
                .then(r => r.json()).then(res => { if(res.status === 'success') { Swal.fire('Berhasil!', 'Admin ditambahkan.', 'success'); loadAdminList(); } else Swal.fire('Error', res.message, 'error'); });
            }
        }

        // FITUR BARU: RESET PASSWORD ADMIN
        async function resetPasswordUser(username) {
            const { value: passBaru } = await Swal.fire({
                title: `Reset Password`,
                text: `Masukkan password baru untuk ${username}`,
                input: 'text', inputPlaceholder: 'Ketik password baru...',
                showCancelButton: true, confirmButtonText: 'Ganti Password'
            });
            if (passBaru) {
                fetch(scriptUrl, { method: "POST", body: JSON.stringify({ action: "reset_password_admin", admin: currentUser, targetUser: username, passBaru: passBaru }) })
                .then(r => r.json()).then(res => { if(res.status === 'success') { Swal.fire('Sukses!', `Password ${username} berhasil diubah.`, 'success'); loadAdminList(); } else Swal.fire('Error', res.message, 'error'); });
            }
        }

        function hapusUser(username) {
            Swal.fire({ title: 'Hapus Akses?', text: `Cabut akses untuk ${username}?`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'Ya, Hapus!' })
            .then((result) => { if (result.isConfirmed) { fetch(scriptUrl, { method: "POST", body: JSON.stringify({ action: "hapus_admin", admin: currentUser, userHapus: username }) }).then(() => { Swal.fire('Terhapus!', 'User telah dihapus.', 'success'); loadAdminList(); }); } });
        }

        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById('tab-' + tabId).classList.add('active');
            document.querySelectorAll('.admin-nav').forEach(n => { n.classList.remove('text-teal-600'); n.classList.add('text-slate-400'); n.querySelector('span').classList.replace('font-black', 'font-bold'); n.querySelector('.icon-bg').classList.remove('bg-teal-50'); });
            element.classList.replace('text-slate-400', 'text-teal-600'); element.querySelector('span').classList.replace('font-bold', 'font-black'); element.querySelector('.icon-bg').classList.add('bg-teal-50');
        }
        function logout() { location.reload(); }
    </script>
</body>
</html>
