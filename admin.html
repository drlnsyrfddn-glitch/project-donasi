<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Infaq Bersama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        ::-webkit-scrollbar { display: none; }
        .pb-safe { padding-bottom: 100px; }
        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .toggle-checkbox:checked { right: 0; border-color: #0d9488; }
        .toggle-checkbox:checked + .toggle-label { background-color: #0d9488; }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative flex flex-col">

    <div id="login-screen" class="absolute inset-0 z-[100] bg-slate-50 flex flex-col justify-center px-6 min-h-screen">
        <div class="bg-gradient-to-br from-teal-600 to-teal-800 p-8 rounded-[40px] shadow-2xl text-white relative overflow-hidden">
            <div class="relative z-10 text-center mb-8">
                <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4 backdrop-blur-md border border-white/30">
                    <i class="fas fa-shield-alt text-3xl text-white"></i>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tight">Portal Admin</h1>
                <p class="text-[11px] text-teal-100 mt-1 opacity-90">Sistem Manajemen Infaq Bersama</p>
            </div>
            <form id="login-form" class="relative z-10 space-y-4" onsubmit="handleLogin(event)">
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest opacity-80 ml-1">Username</label>
                    <input type="text" id="username" required placeholder="Masukkan username..." class="w-full mt-1 px-4 py-3.5 bg-white/10 border border-white/20 rounded-2xl focus:ring-2 focus:ring-white outline-none text-sm font-medium placeholder-teal-200 transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest opacity-80 ml-1">Password</label>
                    <input type="password" id="password" required placeholder="••••••••" class="w-full mt-1 px-4 py-3.5 bg-white/10 border border-white/20 rounded-2xl focus:ring-2 focus:ring-white outline-none text-sm font-medium placeholder-teal-200 transition-all">
                </div>
                <button type="submit" class="w-full bg-white text-teal-800 font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all mt-4 text-sm">Masuk ke Dashboard</button>
            </form>
            <i class="fas fa-lock absolute -bottom-10 -right-10 text-9xl text-white opacity-5"></i>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden flex-col min-h-screen pb-safe">
        <header class="bg-slate-800 text-white px-5 pt-8 pb-10 rounded-b-[35px] shadow-lg relative z-10">
            <div class="flex justify-between items-center mb-2">
                <div>
                    <span id="badge-role" class="bg-teal-500/30 text-teal-300 text-[9px] px-2.5 py-1 rounded-full font-bold uppercase tracking-wider">ROLE</span>
                    <h1 class="text-xl font-extrabold tracking-tight mt-1">Dashboard Pengurus</h1>
                </div>
            </div>
        </header>

        <main class="px-5 -mt-6 relative z-20 flex-grow">
            <div id="tab-dashboard" class="tab-content active space-y-5">
                <div class="bg-gradient-to-br from-teal-600 to-teal-800 p-6 rounded-3xl shadow-lg text-white relative overflow-hidden">
                    <div class="relative z-10">
                        <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest mb-1">Total Infaq Terkumpul</p>
                        <h2 class="text-3xl font-black tracking-tighter">Rp 0</h2>
                    </div>
                    <i class="fas fa-wallet absolute -bottom-4 -right-4 text-8xl text-white opacity-10"></i>
                </div>
                <div>
                    <h3 class="font-extrabold text-slate-800 text-sm mb-3 px-1">Rincian Per Program</h3>
                    <div class="grid grid-cols-2 gap-3" id="grid-rincian-program"></div>
                </div>
            </div>

            <div id="tab-program" class="tab-content space-y-4">
                <button onclick="openAddModal()" class="w-full bg-teal-50 border border-teal-200 text-teal-700 font-bold py-3.5 rounded-2xl shadow-sm hover:bg-teal-100 transition flex items-center justify-center gap-2 text-sm">
                    <i class="fas fa-plus-circle"></i> Tambah Program Baru
                </button>
                <div id="list-program-admin"></div>
            </div>

            <div id="tab-donatur" class="tab-content space-y-3">
                <div class="flex justify-between items-center mb-2 px-1">
                    <h3 class="font-extrabold text-slate-800 text-sm">Riwayat Masuk</h3>
                    <span id="badge-total-donasi" class="text-[10px] bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full font-bold">Total: 0</span>
                </div>
                <div id="list-riwayat-donasi"></div>
            </div>

            <div id="tab-sistem" class="tab-content space-y-6">
                <div>
                    <h3 class="font-extrabold text-slate-800 text-sm mb-3 px-1"><i class="fas fa-history text-teal-600 mr-2"></i>Log Aktivitas Sistem</h3>
                    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-4 space-y-4" id="container-log"></div>
                </div>
            </div>

            <div id="tab-akun" class="tab-content space-y-4">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 text-center">
                    <i class="fas fa-user-circle text-4xl text-gray-300 mb-2"></i>
                    <h3 class="font-bold text-gray-700">Akun Admin</h3>
                    <p class="text-xs text-gray-500 mb-4">Anda sedang masuk sebagai admin biasa.</p>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 flex justify-around items-center pt-2 pb-5 px-2 z-50 rounded-t-[35px] shadow-[0_-15px_30px_-10px_rgba(0,0,0,0.08)]">
            <button onclick="switchTab('dashboard', this)" class="admin-nav flex flex-col items-center p-2 text-teal-600 transition w-16">
                <div class="bg-teal-50 p-2 rounded-2xl mb-1 icon-bg"><i class="fas fa-chart-pie text-lg"></i></div><span class="text-[10px] font-bold">Statistik</span>
            </button>
            <button onclick="switchTab('program', this)" class="admin-nav flex flex-col items-center p-2 text-gray-400 hover:text-teal-600 transition w-16">
                <div class="p-2 mb-1 icon-bg"><i class="fas fa-layer-group text-lg"></i></div><span class="text-[10px] font-semibold">Program</span>
            </button>
            <button onclick="switchTab('donatur', this)" class="admin-nav flex flex-col items-center p-2 text-gray-400 hover:text-teal-600 transition w-16">
                <div class="p-2 mb-1 icon-bg"><i class="fas fa-users text-lg"></i></div><span class="text-[10px] font-semibold">Data</span>
            </button>
            <button id="nav-dynamic" onclick="switchTab('sistem', this)" class="admin-nav flex flex-col items-center p-2 text-gray-400 hover:text-teal-600 transition w-16">
                <div class="p-2 mb-1 icon-bg"><i id="icon-dynamic" class="fas fa-cogs text-lg"></i></div><span id="text-dynamic" class="text-[10px] font-semibold">Sistem</span>
            </button>
            <button onclick="logout()" class="flex flex-col items-center p-2 text-red-400 hover:text-red-600 transition w-16">
                <div class="p-2 mb-1"><i class="fas fa-sign-out-alt text-lg"></i></div><span class="text-[10px] font-semibold">Keluar</span>
            </button>
        </nav>
    </div>

    <div id="modal-program" class="fixed inset-0 z-[110] bg-black/60 backdrop-blur-sm hidden flex items-center justify-center px-4">
        <div class="bg-white w-full max-w-sm rounded-[35px] shadow-2xl overflow-hidden animate-fadeIn flex flex-col max-h-[90vh]">
            <div class="bg-teal-700 p-5 text-white flex justify-between items-center flex-shrink-0">
                <h3 id="modal-title" class="font-extrabold text-base">Tambah Program</h3>
                <button onclick="closeModal('modal-program')" class="text-white/50 hover:text-white w-8 h-8 flex items-center justify-center rounded-full bg-white/10"><i class="fas fa-times"></i></button>
            </div>
            <form id="form-program" class="p-5 space-y-4 overflow-y-auto flex-grow" onsubmit="simpanProgram(event)">
                <input type="hidden" id="prog-mode" value="tambah"> <input type="hidden" id="prog-id"> <input type="hidden" id="prog-foto-lama">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Nama Program</label>
                    <input type="text" id="prog-nama" required class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-xs font-bold outline-none focus:border-teal-500">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Target (Rp)</label>
                    <input type="text" id="prog-target" onkeyup="formatRupiahInput(this)" required class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-xs font-bold outline-none focus:border-teal-500"></div>
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Bank</label>
                    <input type="text" id="prog-bank" required class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-xs font-bold outline-none focus:border-teal-500"></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">No. Rekening</label>
                    <input type="text" id="prog-norek" required class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-xs font-bold outline-none focus:border-teal-500"></div>
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Atas Nama</label>
                    <input type="text" id="prog-atas-nama" required class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-xs font-bold outline-none focus:border-teal-500"></div>
                </div>
                <div class="bg-slate-50 p-3 rounded-2xl border border-dashed border-slate-300">
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 block">Ganti Poster</label>
                    <input type="file" id="prog-file" accept="image/*" class="w-full text-[10px]">
                </div>
                <button type="submit" id="btn-save-prog" class="w-full bg-teal-600 text-white font-bold py-3.5 rounded-2xl shadow-lg shadow-teal-600/20 active:scale-95 transition-all text-xs flex justify-center"><i class="fas fa-save mr-2 mt-0.5"></i> Simpan Program</button>
            </form>
        </div>
    </div>

    <div id="modal-donasi" class="fixed inset-0 z-[110] bg-black/60 backdrop-blur-sm hidden flex items-center justify-center px-4">
        <div class="bg-white w-full max-w-sm rounded-[35px] shadow-2xl overflow-hidden animate-fadeIn flex flex-col max-h-[90vh]">
            <div class="bg-blue-600 p-5 text-white flex justify-between items-center flex-shrink-0">
                <h3 class="font-extrabold text-base">Edit Data Donasi</h3>
                <button onclick="closeModal('modal-donasi')" class="text-white/50 hover:text-white w-8 h-8 flex items-center justify-center rounded-full bg-white/10"><i class="fas fa-times"></i></button>
            </div>
            <form id="form-donasi" class="p-5 space-y-4 overflow-y-auto flex-grow" onsubmit="simpanEditDonasi(event)">
                <input type="hidden" id="don-nama-lama">
                <input type="hidden" id="don-nominal-lama">
                <input type="hidden" id="don-program-lama">
                
                <div class="bg-blue-50 border border-blue-100 p-3 rounded-2xl flex items-center gap-3">
                    <div class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center flex-shrink-0"><i class="fas fa-bullseye"></i></div>
                    <div>
                        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Tujuan Program (Terkunci)</p>
                        <h4 id="don-program-display" class="text-xs font-bold text-blue-900 mt-0.5">Memuat...</h4>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Nama Donatur</label>
                    <input type="text" id="don-nama" required class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-xs font-bold outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Wilayah / Alamat</label>
                    <input type="text" id="don-wilayah" required class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-xs font-bold outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Nominal (Rp)</label>
                    <input type="text" id="don-nominal" onkeyup="formatRupiahInput(this)" required class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-xs font-bold outline-none focus:border-blue-500">
                </div>
                <button type="submit" id="btn-save-don" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-2xl shadow-lg shadow-blue-600/20 active:scale-95 transition-all text-xs mt-2 flex items-center justify-center">
                    <i class="fas fa-check-circle mr-2 mt-0.5"></i> Terapkan Perubahan
                </button>
            </form>
        </div>
    </div>

    <script>
        // MASUKKAN URL WEB APP KAMU DI SINI
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbxlsnAeKUnicG1J_JHH576byKCejUtA5TqX3tAKWtoJz7Fw1VetPE8dpNjkrc8zqkJn/exec';
        
        let currentRole = ''; let currentUser = '';
        const formatRupiah = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });

        // HELPER AUTO FORMAT RUPIAH
        function formatRupiahInput(input) {
            let value = input.value.replace(/[^0-9]/g, '');
            input.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        // HELPER UBAH ANGKA KE TEKS BERTITIK SAAT EDIT DATA
        function formatRupiahToString(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        // 1. SISTEM LOGIN
        function handleLogin(event) {
            event.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = event.target.querySelector('button');
            btn.innerText = "Memeriksa..."; btn.disabled = true;

            fetch(scriptUrl, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "login", user: user, pass: pass })
            }).then(res => res.json()).then(res => {
                if(res.status === 'success') {
                    currentUser = user; currentRole = res.role;
                    document.getElementById('badge-role').innerText = currentRole.toUpperCase();
                    const navBtn = document.getElementById('nav-dynamic');
                    if(currentRole === 'superadmin') {
                        navBtn.setAttribute('onclick', "switchTab('sistem', this)");
                        document.getElementById('icon-dynamic').className = 'fas fa-cogs text-lg';
                        document.getElementById('text-dynamic').innerText = 'Sistem';
                    } else {
                        navBtn.setAttribute('onclick', "switchTab('akun', this)");
                        document.getElementById('icon-dynamic').className = 'fas fa-user-cog text-lg';
                        document.getElementById('text-dynamic').innerText = 'Akun';
                    }
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('dashboard-screen').classList.remove('hidden');
                    document.getElementById('dashboard-screen').classList.add('flex');
                    memuatSemuaData(); 
                } else { alert('Login gagal!'); btn.innerText = "Masuk ke Dashboard"; btn.disabled = false; }
            });
        }

        // 2. LOAD SEMUA DATA
        function memuatSemuaData() {
            // LOAD PROGRAM
            fetch(`${scriptUrl}?action=getProgram`).then(res => res.json()).then(dataProgram => {
                const gridRincian = document.getElementById('grid-rincian-program'); gridRincian.innerHTML = ''; 
                const listProgram = document.getElementById('list-program-admin'); listProgram.innerHTML = ''; 
                const colors = ['teal', 'blue', 'amber', 'purple'];
                
                dataProgram.forEach((p, index) => {
                    let col = colors[index % colors.length];
                    gridRincian.innerHTML += `<div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 border-l-4 border-l-${col}-500"><p class="text-[10px] text-gray-500 font-bold mb-1 line-clamp-1">${p.nama}</p><h4 class="text-sm font-black text-slate-800">${formatRupiah.format(p.terkumpul)}</h4></div>`;
                    let isChecked = p.status === 'Aktif' ? 'checked' : '';
                    let opacity = p.status === 'Aktif' ? 'opacity-100' : 'opacity-60 grayscale-[50%]';
                    let btnHapus = currentRole === 'superadmin' ? `<button onclick="hapusProgram('${p.nama}')" class="bg-red-50 hover:bg-red-100 text-red-600 px-3 py-1.5 rounded-lg text-[9px] font-bold"><i class="fas fa-trash"></i> Hapus</button>` : '';

                    listProgram.innerHTML += `
                        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-4 flex items-center gap-4 ${opacity} mb-3 transition-all duration-300">
                            <div class="w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 bg-slate-200">
                                <img src="https://lh3.googleusercontent.com/d/$${p.foto}" onerror="this.src='https://drive.google.com/thumbnail?id=${p.foto}&sz=w500'" class="w-full h-full object-cover">
                            </div>
                            <div class="flex-grow">
                                <h4 class="text-xs font-bold text-slate-800 line-clamp-1 mb-1">${p.nama}</h4>
                                <div class="flex gap-2 mt-2">
                                    <button onclick="openEditModal('${p.id}', '${p.nama}', ${p.target}, '${p.bank}', '${p.norek}', '${p.atas_nama}', '${p.foto}')" class="bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg text-[9px] font-bold"><i class="fas fa-edit"></i> Edit</button>
                                    ${btnHapus}
                                </div>
                            </div>
                            <div class="flex flex-col items-center">
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" ${isChecked} class="sr-only peer" onchange="toggleStatus('${p.nama}', this.checked)">
                                    <div class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-teal-600"></div>
                                </label>
                            </div>
                        </div>`;
                });
            });

            // LOAD DONASI
            fetch(`${scriptUrl}?action=getDonasi`).then(res => res.json()).then(dataDonasi => {
                const totalUang = dataDonasi.reduce((sum, d) => sum + Number(d.nominal), 0);
                document.querySelector('#tab-dashboard h2.text-3xl').innerText = formatRupiah.format(totalUang);
                document.getElementById('badge-total-donasi').innerText = 'Total: ' + dataDonasi.length;
                const listDonatur = document.getElementById('list-riwayat-donasi'); listDonatur.innerHTML = ''; 
                
                [...dataDonasi].reverse().forEach(d => {
                    listDonatur.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between mb-3">
                            <div class="flex items-center gap-3">
                                <a href="${d.struk}" target="_blank" class="w-10 h-10 bg-teal-50 text-teal-600 rounded-full flex items-center justify-center flex-shrink-0"><i class="fas fa-receipt"></i></a>
                                <div>
                                    <h4 class="text-xs font-bold text-slate-800">${d.nama}</h4>
                                    <p class="text-[9px] text-gray-500 line-clamp-1">${d.program} • ${d.wilayah}</p>
                                    <p class="text-[11px] font-black text-teal-600 mt-0.5">${formatRupiah.format(d.nominal)}</p>
                                </div>
                            </div>
                            <div class="flex flex-col gap-1.5 flex-shrink-0">
                                <button onclick="openEditDonasi('${d.nama}', '${d.wilayah}', ${d.nominal}, '${d.program}')" class="bg-blue-50 hover:bg-blue-100 text-blue-600 w-8 h-8 rounded-lg transition"><i class="fas fa-pen text-xs"></i></button>
                                <button onclick="hapusDonasi('${d.nama}', ${d.nominal})" class="bg-red-50 hover:bg-red-100 text-red-600 w-8 h-8 rounded-lg transition"><i class="fas fa-trash text-xs"></i></button>
                            </div>
                        </div>`;
                });
            });

            // LOAD LOG
            if(currentRole === 'superadmin') {
                fetch(`${scriptUrl}?action=getLogs`).then(res => res.json()).then(dataLog => {
                    const containerLog = document.getElementById('container-log');
                    if(containerLog) {
                        containerLog.innerHTML = '';
                        dataLog.slice(0, 15).forEach(l => {
                            const dt = new Date(l.waktu).toLocaleString('id-ID', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
                            containerLog.innerHTML += `<div class="flex gap-3 items-start mb-4 border-b border-gray-50 pb-3"><div class="w-7 h-7 bg-slate-100 text-slate-500 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5"><i class="fas fa-info text-[9px]"></i></div><div><p class="text-[11px] text-gray-700 leading-snug"><b>${l.user}</b> ${l.aktivitas}</p><span class="text-[9px] text-gray-400 mt-0.5 block">${dt}</span></div></div>`;
                        });
                    }
                });
            }
        }

        // 3. FUNGSI EDIT DATA DONASI
        function openEditDonasi(nama, wilayah, nominal, programLama) {
            document.getElementById('don-nama-lama').value = nama;
            document.getElementById('don-nominal-lama').value = nominal;
            document.getElementById('don-program-lama').value = programLama;
            
            document.getElementById('don-program-display').innerText = programLama;
            document.getElementById('don-nama').value = nama;
            document.getElementById('don-wilayah').value = wilayah;
            
            // Format nominal ke text bertitik saat dimuat
            document.getElementById('don-nominal').value = formatRupiahToString(nominal);

            document.getElementById('modal-donasi').classList.remove('hidden');
        }

        function simpanEditDonasi(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-save-don');
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Menyimpan...`; btn.disabled = true;

            const payload = {
                action: "edit_donasi",
                admin: currentUser,
                nama_lama: document.getElementById('don-nama-lama').value,
                nominal_lama: document.getElementById('don-nominal-lama').value,
                program_lama: document.getElementById('don-program-lama').value,
                nama_baru: document.getElementById('don-nama').value,
                wilayah_baru: document.getElementById('don-wilayah').value,
                // Hapus titik sebelum dikirim ke database
                nominal_baru: document.getElementById('don-nominal').value.replace(/\./g, '')
            };

            fetch(scriptUrl, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload)
            }).then(res => res.json()).then(res => {
                if(res.status === 'success') {
                    alert('Data donasi berhasil diperbarui!');
                    closeModal('modal-donasi'); memuatSemuaData();
                } else { alert("Gagal menyimpan data donasi."); }
                btn.innerHTML = `<i class="fas fa-check-circle mr-2"></i> Terapkan Perubahan`; btn.disabled = false;
            });
        }

        // FUNGSI UMUM MODAL
        function closeModal(idModal) { document.getElementById(idModal).classList.add('hidden'); }
        function openAddModal() { document.getElementById('modal-title').innerText = "Tambah Program Baru"; document.getElementById('prog-mode').value = "tambah"; document.getElementById('form-program').reset(); document.getElementById('modal-program').classList.remove('hidden'); }
        
        function openEditModal(id, nama, target, bank, norek, an, foto) { 
            document.getElementById('modal-title').innerText = "Edit Program"; 
            document.getElementById('prog-mode').value = "edit"; 
            document.getElementById('prog-id').value = id; 
            document.getElementById('prog-nama').value = nama; 
            
            // Format nominal ke text bertitik saat dimuat
            document.getElementById('prog-target').value = formatRupiahToString(target); 
            
            document.getElementById('prog-bank').value = bank; 
            document.getElementById('prog-norek').value = norek; 
            document.getElementById('prog-atas-nama').value = an; 
            document.getElementById('prog-foto-lama').value = foto; 
            document.getElementById('modal-program').classList.remove('hidden'); 
        }

        // CRUD PROGRAM
        function simpanProgram(event) {
            event.preventDefault(); const btn = document.getElementById('btn-save-prog'); btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Memproses...`; btn.disabled = true;
            const fileInput = document.getElementById('prog-file'); const mode = document.getElementById('prog-mode').value;
            const sendData = (base64 = null, mime = null) => {
                fetch(scriptUrl, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                    body: JSON.stringify({ 
                        action: "simpan_program", 
                        mode: mode, 
                        admin: currentUser, 
                        id_program: document.getElementById('prog-id').value, 
                        nama: document.getElementById('prog-nama').value, 
                        // Hapus titik sebelum dikirim ke database
                        target: document.getElementById('prog-target').value.replace(/\./g, ''), 
                        bank: document.getElementById('prog-bank').value, 
                        norek: document.getElementById('prog-norek').value, 
                        atas_nama: document.getElementById('prog-atas-nama').value, 
                        foto_lama: document.getElementById('prog-foto-lama').value, 
                        file_base64: base64, mime_type: mime 
                    })
                }).then(res => res.json()).then(res => {
                    if(res.status === 'success') { alert('Data program tersimpan.'); closeModal('modal-program'); memuatSemuaData(); }
                    btn.innerHTML = `<i class="fas fa-save"></i> Simpan Program`; btn.disabled = false;
                });
            };
            if (fileInput.files[0]) { const reader = new FileReader(); reader.readAsDataURL(fileInput.files[0]); reader.onload = (e) => sendData(e.target.result, fileInput.files[0].type); } else { sendData(); }
        }

        function toggleStatus(namaProgram, isAktif) { fetch(scriptUrl, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "update_status_program", nama_program: namaProgram, status: isAktif ? 'Aktif' : 'Nonaktif', admin: currentUser }) }).then(() => memuatSemuaData()); }
        function hapusProgram(namaProgram) { if(confirm(`Hapus program "${namaProgram}" secara permanen?`)) { fetch(scriptUrl, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "hapus_program", nama_program: namaProgram, admin: currentUser }) }).then(() => memuatSemuaData()); } }
        function hapusDonasi(nama, nominal) { if(confirm(`Hapus donasi dari ${nama} sebesar ${formatRupiah.format(nominal)}? (Saldo program akan dikurangi)`)) { fetch(scriptUrl, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "hapus_donasi", nama: nama, nominal: nominal, admin: currentUser }) }).then(() => memuatSemuaData()); } }

        // NAVIGASI
        function logout() { location.reload(); }
        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById('tab-' + tabId).classList.add('active');
            document.querySelectorAll('.admin-nav').forEach(n => { n.classList.remove('text-teal-600'); n.classList.add('text-gray-400'); n.querySelector('span').classList.remove('font-bold'); n.querySelector('span').classList.add('font-semibold'); n.querySelector('.icon-bg').classList.remove('bg-teal-50', 'rounded-2xl'); });
            element.classList.remove('text-gray-400'); element.classList.add('text-teal-600'); element.querySelector('span').classList.remove('font-semibold'); element.querySelector('span').classList.add('font-bold'); element.querySelector('.icon-bg').classList.add('bg-teal-50', 'rounded-2xl');
        }
    </script>
</body>
</html>
