<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan - Infaq Bersama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 flex justify-center overflow-hidden">

    <div class="w-full max-w-md bg-gray-50 h-screen relative shadow-2xl flex flex-col pb-16">
        
        <div class="bg-gradient-to-br from-teal-600 to-teal-800 px-5 pt-8 pb-20 rounded-b-3xl relative shadow-md text-white flex-shrink-0">
            <div class="relative z-10 flex justify-between items-start mb-2">
                <div class="flex items-center">
                    <a href="index.html" class="p-2 -ml-2 hover:bg-white/20 rounded-full transition"><i class="fas fa-arrow-left"></i></a>
                    <h1 class="ml-2 font-bold text-lg">Laporan Infaq Wilayah</h1>
                </div>
                <div class="flex items-center gap-1.5 bg-white/20 px-2.5 py-1 rounded-full backdrop-blur-sm mt-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                    </svg>
                    <span class="text-[9px] font-extrabold tracking-wider uppercase">Infaq Bersama</span>
                </div>
            </div>
            <i class="fas fa-chart-pie absolute -bottom-4 -right-4 text-8xl text-white opacity-10"></i>
        </div>

        <div class="flex-grow overflow-y-auto px-4 -mt-14 relative z-20 pb-10">

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-4">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-xs text-gray-500 font-semibold mb-1">Total Terkumpul</p>
                        <h2 class="text-2xl font-bold text-gray-800" id="total-semua">Rp 0</h2>
                    </div>
                    <span class="bg-teal-50 text-teal-600 text-[10px] font-bold px-2 py-1 rounded border border-teal-100">Semua Waktu</span>
                </div>
                <div class="relative h-64 w-full flex justify-center items-center">
                    <canvas id="chartWilayah"></canvas>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-4">
                <h3 class="text-sm font-bold text-gray-800 mb-3">Rincian Berdasarkan Alamat</h3>
                <div class="space-y-3" id="list-rincian-alamat"></div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-sm font-bold text-gray-800 mb-3 border-b border-gray-50 pb-2">Riwayat Infaq Terbaru</h3>
                <div class="space-y-3" id="list-riwayat"></div>
            </div>

            <div class="mt-8 mb-4 text-center opacity-70">
                <p class="text-[9px] text-gray-500 tracking-[0.2em] font-bold uppercase">
                    &copy; 2026 FOUNDERLAN SYSTEMS
                </p>
                <p class="text-[8px] text-gray-400 mt-1 italic">
                    Building Foundation, Empowering Ummah.
                </p>
            </div>

        </div>

        <nav class="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-md bg-white/95 backdrop-blur-md border-t border-gray-100 flex justify-around items-center pt-2 pb-5 px-4 z-50 rounded-t-[32px] shadow-[0_-10px_40px_-10px_rgba(0,0,0,0.08)]">
        <a href="index.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-teal-600 transition w-16">
            <div class="p-1.5 mb-1"><i class="fas fa-home text-lg"></i></div>
            <span class="text-[10px] font-bold">Beranda</span>
        </a>
        <a href="program.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-teal-600 transition w-16">
            <div class="p-1.5 mb-1"><i class="fas fa-layer-group text-lg"></i></div>
            <span class="text-[10px] font-bold">Program</span>
        </a>
        <a href="donasi.html" class="flex flex-col items-center p-2 text-teal-600 transition w-16">
            <div class="bg-teal-50 p-1.5 rounded-xl mb-1"><i class="fas fa-receipt text-lg"></i></div>
            <span class="text-[10px] font-black">Laporan</span>
        </a>
        <a href="panduan.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-teal-600 transition w-16">
            <div class="p-1.5 mb-1"><i class="fas fa-book-open text-lg"></i></div>
            <span class="text-[10px] font-bold">Panduan</span>
        </a>
    </nav>
    </div>

    <script>
        // MASUKKAN URL WEB APP KAMU DI SINI
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbxlsnAeKUnicG1J_JHH576byKCejUtA5TqX3tAKWtoJz7Fw1VetPE8dpNjkrc8zqkJn/exec';
        
        const formatRupiah = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });
        const chartColors = ['#10b981', '#3b82f6', '#ef4444', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316', '#6366f1', '#84cc16'];

        window.onload = function() {
            document.getElementById('total-semua').innerText = "Memuat data...";
            document.getElementById('list-rincian-alamat').innerHTML = '<p class="text-xs text-center text-gray-400 py-4"><i class="fas fa-circle-notch fa-spin mr-2"></i> Sinkronisasi ke server...</p>';
            document.getElementById('list-riwayat').innerHTML = '<p class="text-xs text-center text-gray-400 py-4">Memuat riwayat...</p>';

            fetch(`${scriptUrl}?action=getDonasi`)
                .then(res => res.json())
                .then(data => {
                    if(!data || data.length === 0) {
                        document.getElementById('total-semua').innerText = "Rp 0";
                        document.getElementById('list-rincian-alamat').innerHTML = '<p class="text-xs text-center text-gray-400">Belum ada donasi masuk.</p>';
                        return;
                    }

                    // 1. Hitung Total Semua Infaq
                    const totalSemua = data.reduce((sum, item) => sum + Number(item.nominal), 0);
                    document.getElementById('total-semua').innerText = formatRupiah.format(totalSemua);

                    // 2. Agregasi Data berdasarkan Wilayah
                    const rekapWilayah = {};
                    data.forEach(item => {
                        const wil = item.wilayah || 'Lainnya';
                        if(!rekapWilayah[wil]) rekapWilayah[wil] = 0;
                        rekapWilayah[wil] += Number(item.nominal);
                    });

                    // Konversi ke array dan urutkan dari yang terbesar
                    const arrayWilayah = Object.keys(rekapWilayah).map(nama => ({
                        nama: nama,
                        total: rekapWilayah[nama]
                    })).sort((a, b) => b.total - a.total);

                    // Render List Wilayah & Progress Bar
                    const listRincian = document.getElementById('list-rincian-alamat');
                    listRincian.innerHTML = '';
                    let maxTotal = arrayWilayah.length > 0 ? arrayWilayah[0].total : 1;

                    arrayWilayah.forEach((item, index) => {
                        let persenBar = (item.total / maxTotal) * 100;
                        let color = chartColors[index % chartColors.length];
                        listRincian.innerHTML += `
                            <div class="flex justify-between items-center group mb-3">
                                <div class="flex items-center">
                                    <i class="fas fa-map-pin w-5 text-center text-gray-400 text-xs mr-2"></i>
                                    <span class="text-xs font-semibold text-gray-700">${item.nama}</span>
                                </div>
                                <div class="text-right w-1/2">
                                    <span class="text-xs font-bold text-gray-800">${formatRupiah.format(item.total)}</span>
                                    <div class="w-full flex justify-end mt-0.5">
                                        <div class="h-1 rounded-full" style="width: ${persenBar}%; background-color: ${color};"></div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    // Render Chart.js
                    const ctx = document.getElementById('chartWilayah').getContext('2d');
                    new Chart(ctx, {
                        type: 'pie',
                        data: {
                            labels: arrayWilayah.map(item => item.nama),
                            datasets: [{ data: arrayWilayah.map(item => item.total), backgroundColor: chartColors, borderWidth: 0, hoverOffset: 4 }]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false, layout: { padding: { bottom: 10 } },
                            plugins: {
                                legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 8, padding: 15, font: { size: 10, family: "'Inter', sans-serif" } } },
                                tooltip: { callbacks: { label: function(context) { return ' ' + formatRupiah.format(context.raw); } } }
                            }
                        }
                    });

                    // 3. Render Riwayat Infaq Terbaru (Di-reverse agar terbaru di atas)
                    const listRiwayat = document.getElementById('list-riwayat');
                    listRiwayat.innerHTML = '';
                    const dataTerbaru = [...data].reverse().slice(0, 15); // Menampilkan 15 transaksi terakhir

                    dataTerbaru.forEach(item => {
                        const dateObj = new Date(item.tanggal);
                        const tglText = dateObj.toLocaleDateString('id-ID', {day: 'numeric', month: 'short'});

                        listRiwayat.innerHTML += `
                            <div class="flex items-center justify-between p-3 bg-gray-50 rounded-xl hover:bg-gray-100 transition mb-2">
                                <div class="flex items-center">
                                    <div class="w-8 h-8 bg-teal-100 text-teal-600 rounded-full flex items-center justify-center text-xs mr-3 flex-shrink-0"><i class="fas fa-user"></i></div>
                                    <div>
                                        <h4 class="font-bold text-gray-800 text-xs leading-tight">${item.nama}</h4>
                                        <p class="text-[9px] text-gray-500 mt-0.5 line-clamp-1">${item.program} • ${item.wilayah}</p>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="text-xs font-bold text-teal-600">${formatRupiah.format(item.nominal)}</p>
                                    <p class="text-[8px] text-gray-400 mt-0.5">${tglText}</p>
                                </div>
                            </div>
                        `;
                    });

                }).catch(err => {
                    console.log("Error mengambil data:", err);
                    document.getElementById('total-semua').innerText = "Gagal terhubung";
                    document.getElementById('list-rincian-alamat').innerHTML = '<p class="text-xs text-center text-red-400">Gagal memuat data dari server.</p>';
                });
        };
    </script>
</body>
</html>
