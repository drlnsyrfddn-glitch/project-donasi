<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Infaq - Infaq Bersama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        ::-webkit-scrollbar { display: none; }
        
        /* Modern Radio Chips */
        .radio-chip input[type="radio"] { display: none; }
        .radio-chip label {
            display: flex; align-items: center; justify-content: center;
            height: 100%; padding: 12px 6px; font-size: 11px; font-weight: 700;
            background-color: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 12px; 
            color: #64748b; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .radio-chip input[type="radio"]:checked + label {
            background-color: #f0fdfa; color: #0d9488; border-color: #0d9488;
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.15);
        }

        /* Smooth Input Focus */
        .input-modern { transition: all 0.3s ease; }
        .input-modern:focus { border-color: #0d9488; box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.1); }
    </style>
</head>
<body class="flex justify-center text-slate-800">

    <div class="w-full max-w-md bg-white min-h-screen relative shadow-2xl flex flex-col overflow-hidden">
        
        <header class="bg-white/90 backdrop-blur-md sticky top-0 z-50 px-5 py-4 border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="program.html" class="w-9 h-9 bg-slate-50 text-slate-600 rounded-full flex items-center justify-center hover:bg-teal-50 hover:text-teal-600 transition">
                    <i class="fas fa-arrow-left text-sm"></i>
                </a>
                <h1 class="font-extrabold text-slate-800 text-lg">Formulir Infaq</h1>
            </div>
            <div class="flex items-center gap-1.5 bg-teal-50 px-3 py-1.5 rounded-full border border-teal-100/50">
                <i class="fas fa-heart text-teal-600 text-[10px]"></i>
                <span class="text-[9px] font-black text-teal-700 tracking-widest uppercase">Infaq Bersama</span>
            </div>
        </header>

        <main class="flex-grow px-5 pt-5 pb-[130px] overflow-y-auto space-y-6">
            
            <div>
                <span class="bg-teal-50 text-teal-600 text-[9px] font-black px-2.5 py-1 rounded-md mb-2 inline-block uppercase tracking-widest border border-teal-100">Sedang Berjalan</span>
                <h2 id="display-program" class="font-extrabold text-slate-800 leading-snug text-xl">Memuat program...</h2>
            </div>

            <div class="bg-gradient-to-br from-teal-700 to-emerald-900 p-6 rounded-[28px] shadow-[0_15px_30px_-10px_rgba(13,148,136,0.4)] text-white relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-[10px] font-bold text-teal-100/80 mb-4 uppercase tracking-widest">Tujuan Transfer</p>
                    <div class="flex justify-between items-center gap-4">
                        <div class="flex-grow">
                            <h4 class="text-sm font-extrabold mb-0.5 text-teal-50" id="disp-bank">Memuat Bank...</h4>
                            <p class="text-2xl font-black tracking-widest mb-1.5" id="disp-norek">----</p>
                            <p class="text-[11px] font-medium text-teal-100/90 line-clamp-1" id="disp-nama">a.n Memuat Nama...</p>
                        </div>
                        <button onclick="copyNorek()" class="bg-white/10 hover:bg-white/20 backdrop-blur-md p-3.5 rounded-2xl transition-all active:scale-90 border border-white/10 shadow-sm flex-shrink-0">
                            <i class="fas fa-copy text-xl text-white"></i>
                        </button>
                    </div>
                </div>
                <div class="absolute -bottom-6 -right-6 w-32 h-32 bg-white opacity-5 rounded-full blur-2xl"></div>
                <i class="fas fa-wallet absolute -bottom-4 -right-4 text-8xl text-white opacity-[0.03]"></i>
            </div>

            <div class="bg-white rounded-[32px] shadow-sm border border-slate-100 p-6 relative">
                <form id="form-donasi" class="space-y-6">
                    
                    <div>
                        <label class="block text-[11px] font-extrabold text-slate-500 mb-2 uppercase tracking-widest">Nominal Infaq *</label>
                        <div class="relative flex items-center">
                            <span class="absolute left-4 font-black text-slate-400">Rp</span>
                            <input type="text" id="input_nominal" required placeholder="10.000" onkeyup="formatRupiahInput(this)" 
                                   class="input-modern w-full pl-12 pr-4 py-4 bg-slate-50 border-1.5 border-slate-200 rounded-2xl outline-none font-black text-xl text-slate-800 placeholder-slate-300">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[11px] font-extrabold text-slate-500 mb-2 uppercase tracking-widest">Nama Lengkap *</label>
                        <input type="text" id="input_nama" required placeholder="Contoh: Hamba Allah" 
                               class="input-modern w-full px-5 py-4 bg-slate-50 border-1.5 border-slate-200 rounded-2xl outline-none text-sm font-bold text-slate-800 placeholder-slate-400">
                    </div>

                    <div>
                        <label class="block text-[11px] font-extrabold text-slate-500 mb-2 uppercase tracking-widest">Bukti Transfer *</label>
                        <div class="relative input-modern bg-slate-50 border-1.5 border-slate-200 rounded-2xl overflow-hidden hover:bg-slate-100 transition cursor-pointer">
                            <input type="file" id="input_file" accept="image/*" required
                                   class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                            <div class="flex items-center px-4 py-3.5 pointer-events-none">
                                <div class="bg-teal-100 text-teal-700 px-3 py-1.5 rounded-xl text-xs font-bold mr-3 whitespace-nowrap">Pilih File</div>
                                <span id="file-name-display" class="text-xs font-semibold text-slate-400 truncate">Format JPG/PNG...</span>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[11px] font-extrabold text-slate-500 mb-3 uppercase tracking-widest">Pilih Wilayah Anda *</label>
                        <div class="grid grid-cols-3 gap-2.5 radio-chip">
                            <div><input type="radio" name="alamat" id="al_mapanga" value="Mapanga" onchange="toggleAlamatLain()"><label for="al_mapanga">Mapanga</label></div>
                            <div><input type="radio" name="alamat" id="al_tojambu" value="Tojambu" onchange="toggleAlamatLain()"><label for="al_tojambu">Tojambu</label></div>
                            <div><input type="radio" name="alamat" id="al_betteng" value="Betteng" onchange="toggleAlamatLain()"><label for="al_betteng">Betteng</label></div>
                            
                            <div><input type="radio" name="alamat" id="al_paredean" value="Paredean" onchange="toggleAlamatLain()"><label for="al_paredean">Paredean</label></div>
                            <div><input type="radio" name="alamat" id="al_padanglambe" value="Padang Lambe" onchange="toggleAlamatLain()"><label for="al_padanglambe">P. Lambe</label></div>
                            <div><input type="radio" name="alamat" id="al_sangkin" value="Sangkin" onchange="toggleAlamatLain()"><label for="al_sangkin">Sangkin</label></div>
                            
                            <div><input type="radio" name="alamat" id="al_sumarambu" value="Sumarambu" onchange="toggleAlamatLain()"><label for="al_sumarambu">Sumarambu</label></div>
                            <div><input type="radio" name="alamat" id="al_palopokota" value="Palopo Kota" onchange="toggleAlamatLain()"><label for="al_palopokota">Palopo</label></div>
                            <div><input type="radio" name="alamat" id="al_lara" value="Lara'" onchange="toggleAlamatLain()"><label for="al_lara">Lara'</label></div>
                            
                            <div><input type="radio" name="alamat" id="al_morowali" value="Morowali" onchange="toggleAlamatLain()"><label for="al_morowali">Morowali</label></div>
                            <div><input type="radio" name="alamat" id="al_makassar" value="Makassar" onchange="toggleAlamatLain()"><label for="al_makassar">Makassar</label></div>
                            <div><input type="radio" name="alamat" id="al_palu" value="Palu" onchange="toggleAlamatLain()"><label for="al_palu">Palu</label></div>
                            
                            <div><input type="radio" name="alamat" id="al_kalimantan" value="Kalimantan" onchange="toggleAlamatLain()"><label for="al_kalimantan">Kalimantan</label></div>
                            <div><input type="radio" name="alamat" id="al_papua" value="Papua" onchange="toggleAlamatLain()"><label for="al_papua">Papua</label></div>
                            <div><input type="radio" name="alamat" id="al_lainnya" value="Lainnya" onchange="toggleAlamatLain()"><label for="al_lainnya">Lainnya...</label></div>
                        </div>
                        <input type="text" id="alamat_lain_text" placeholder="Ketik nama kota/wilayah Anda..." 
                               class="input-modern w-full px-5 py-4 bg-teal-50/50 border-1.5 border-teal-100 rounded-2xl mt-3 hidden outline-none text-sm font-bold text-teal-900 placeholder-teal-400">
                    </div>
                    
                    <button type="button" onclick="submitDonasi()" id="btn-submit" class="w-full bg-teal-600 text-white font-extrabold py-4 px-4 rounded-2xl shadow-[0_8px_20px_-6px_rgba(13,148,136,0.5)] hover:bg-teal-700 transition-all active:scale-[0.98] flex items-center justify-center mt-2">
                        <i class="fas fa-paper-plane mr-2" id="icon-submit"></i> <span id="text-submit">Kirim Infaq Sekarang</span>
                    </button>
                </form>
            </div>
            
            <div class="pt-4 pb-2 text-center">
                <p class="text-[9px] text-slate-400 tracking-[0.2em] font-black uppercase mb-1">
                    &copy; 2026 FOUNDERLAN SYSTEMS
                </p>
                <p class="text-[9px] text-slate-400 font-medium italic">
                    Building Foundation, Empowering Ummah.
                </p>
            </div>
            
        </main>

        <nav class="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-md bg-white/95 backdrop-blur-md border-t border-gray-100 flex justify-around items-center pt-2 pb-5 px-3 z-50 rounded-t-[32px] shadow-[0_-10px_40px_-10px_rgba(0,0,0,0.08)]">
            <a href="index.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-teal-600 transition w-16">
                <div class="p-1.5 mb-1"><i class="fas fa-home text-lg"></i></div>
                <span class="text-[10px] font-bold">Beranda</span>
            </a>
            <a href="program.html" class="flex flex-col items-center p-2 text-teal-600 transition w-16">
                <div class="bg-teal-50 p-1.5 rounded-xl mb-1"><i class="fas fa-hand-holding-heart text-lg"></i></div>
                <span class="text-[10px] font-black">Infaq</span>
            </a>
            <a href="donasi.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-teal-600 transition w-16">
                <div class="p-1.5 mb-1"><i class="fas fa-chart-bar text-lg"></i></div>
                <span class="text-[10px] font-bold">Laporan</span>
            </a>
            <a href="panduan.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-teal-600 transition w-16">
                <div class="p-1.5 mb-1"><i class="fas fa-book text-lg"></i></div>
                <span class="text-[10px] font-bold">Panduan</span>
            </a>
        </nav>
    </div>

    <script>
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbxlsnAeKUnicG1J_JHH576byKCejUtA5TqX3tAKWtoJz7Fw1VetPE8dpNjkrc8zqkJn/exec';

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const progName = urlParams.get('name');
            
            if(progName) { 
                const decodedName = decodeURIComponent(progName);
                document.getElementById('display-program').innerText = decodedName; 
                
                fetch(`${scriptUrl}?action=getProgram`)
                    .then(res => res.json())
                    .then(data => {
                        const prog = data.find(p => p.nama === decodedName);
                        if(prog) {
                            document.getElementById('disp-bank').innerText = prog.bank;
                            document.getElementById('disp-norek').innerText = prog.norek;
                            document.getElementById('disp-nama').innerText = 'a.n ' + prog.atas_nama;
                        } else {
                            document.getElementById('disp-norek').innerText = "Program tidak ditemukan";
                        }
                    }).catch(err => console.log("Gagal memuat rekening:", err));
            } else {
                document.getElementById('display-program').innerText = "Belum memilih program";
            }
        };

        // Mengubah teks saat file dipilih
        document.getElementById('input_file').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || 'Format JPG/PNG...';
            document.getElementById('file-name-display').innerText = fileName;
            document.getElementById('file-name-display').classList.replace('text-slate-400', 'text-teal-700');
        });

        function submitDonasi() {
            const fileInput = document.getElementById('input_file');
            const namaDonatur = document.getElementById('input_nama').value;
            const nominalInput = document.getElementById('input_nominal').value;
            const nominalDonasi = nominalInput.replace(/\./g, ''); 
            
            const wilayahRadio = document.querySelector('input[name="alamat"]:checked');
            const wilayahDonatur = wilayahRadio && wilayahRadio.value === 'Lainnya' 
                ? document.getElementById('alamat_lain_text').value 
                : (wilayahRadio ? wilayahRadio.value : '');
            
            const progName = document.getElementById('display-program').innerText;

            if (fileInput.files.length === 0 || !namaDonatur || !nominalDonasi || !wilayahDonatur) {
                alert("Harap lengkapi semua data dan pilih foto struk/bukti transfer!");
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            const btnSubmit = document.getElementById('btn-submit');
            const iconSubmit = document.getElementById('icon-submit');
            const textSubmit = document.getElementById('text-submit');

            btnSubmit.classList.replace('bg-teal-600', 'bg-slate-400');
            btnSubmit.classList.remove('shadow-[0_8px_20px_-6px_rgba(13,148,136,0.5)]');
            btnSubmit.disabled = true;
            iconSubmit.className = "fas fa-circle-notch fa-spin mr-2";
            textSubmit.innerText = "Mengirim Data...";

            reader.onload = function(e) {
                const base64Data = e.target.result;
                
                const payload = {
                    action: "input_donasi",
                    program: progName, 
                    nama: namaDonatur,
                    wilayah: wilayahDonatur, 
                    nominal: nominalDonasi,
                    file_base64: base64Data,
                    mime_type: file.type
                };
                
                fetch(scriptUrl, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(res => {
                    if(res.status === 'success') {
                        btnSubmit.classList.replace('bg-slate-400', 'bg-emerald-500');
                        iconSubmit.className = "fas fa-check-circle mr-2";
                        textSubmit.innerText = "Berhasil Terkirim!";
                        alert("Alhamdulillah, formulir infaq Anda berhasil dikirim!");
                        window.location.href = 'donasi.html'; 
                    } else {
                        throw new Error(res.message || "Gagal menyimpan data.");
                    }
                })
                .catch(err => {
                    alert("Terjadi kesalahan sistem. Silakan coba lagi.");
                    btnSubmit.disabled = false;
                    btnSubmit.classList.replace('bg-slate-400', 'bg-teal-600');
                    btnSubmit.classList.add('shadow-[0_8px_20px_-6px_rgba(13,148,136,0.5)]');
                    iconSubmit.className = "fas fa-paper-plane mr-2";
                    textSubmit.innerText = "Kirim Infaq Sekarang";
                });
            };

            reader.readAsDataURL(file); 
        }

        function formatRupiahInput(input) {
            let value = input.value.replace(/[^0-9]/g, '');
            input.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function toggleAlamatLain() {
            const isLainnya = document.getElementById('al_lainnya').checked;
            document.getElementById('alamat_lain_text').classList.toggle('hidden', !isLainnya);
            if(isLainnya) document.getElementById('alamat_lain_text').focus();
        }

        function copyNorek() {
            const norek = document.getElementById('disp-norek').innerText;
            navigator.clipboard.writeText(norek.replace(/\s/g, ''));
            alert('Nomor rekening berhasil disalin!');
        }
    </script>
</body>
</html>
