<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Program - Infaq Bersama Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        ::-webkit-scrollbar { display: none; }
        .pb-safe-nav { padding-bottom: 120px; }
        
        /* Glassmorphism Header */
        .glass-header { background-color: rgba(255, 255, 255, 0.9); backdrop-blur-md; border-b: 1px solid #f1f5f9; sticky top: 0; z-index: 40; }
        
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .loading-skeleton { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative flex flex-col">
    
    <header class="glass-header px-5 pt-7 pb-4 sticky top-0 z-40 shadow-sm">
        <div class="flex items-center gap-3.5">
            <a href="index.html" class="w-10 h-10 bg-slate-50 text-slate-600 rounded-xl flex items-center justify-center hover:bg-teal-50 hover:text-teal-600 transition shadow-inner">
                <i class="fas fa-arrow-left text-sm"></i>
            </a>
            <div>
                <h1 class="text-xl font-extrabold tracking-tight text-slate-900">Semua Program</h1>
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Pilih Wadah Jariyah Anda</p>
            </div>
        </div>
    </header>

    <main class="px-5 mt-7 flex-grow pb-safe-nav">
        <div class="grid grid-cols-2 gap-4" id="list-semua-program">
            <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 loading-skeleton flex flex-col">
                <div class="h-32 bg-slate-200"></div>
                <div class="p-4 flex-grow space-y-3">
                    <div class="h-4 bg-slate-200 rounded-full w-3/4"></div>
                    <div class="h-1.5 bg-slate-100 rounded-full w-full mt-4"></div>
                </div>
            </div>
            <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 loading-skeleton flex flex-col">
                <div class="h-32 bg-slate-200"></div>
                <div class="p-4 flex-grow space-y-3">
                    <div class="h-4 bg-slate-200 rounded-full w-3/4"></div>
                    <div class="h-1.5 bg-slate-100 rounded-full w-full mt-4"></div>
                </div>
            </div>
        </div>

        <div class="pt-10 pb-3 text-center opacity-60">
            <p class="text-[9px] text-slate-400 tracking-[0.2em] font-black uppercase mb-1">
                &copy; 2026 FOUNDERLAN SYSTEMS
            </p>
            <p class="text-[9px] text-slate-400 font-medium italic">
                Building Foundation, Empowering Ummah.
            </p>
        </div>
    </main>

    <nav class="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-md bg-white/95 backdrop-blur-md border-t border-gray-100 flex justify-around items-center pt-2 pb-5 px-4 z-50 rounded-t-[32px] shadow-[0_-10px_40px_-10px_rgba(0,0,0,0.08)]">
        <a href="index.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-teal-600 transition w-16">
            <div class="p-1.5 mb-1"><i class="fas fa-home text-lg"></i></div>
            <span class="text-[10px] font-bold">Beranda</span>
        </a>
        <a href="program.html" class="flex flex-col items-center p-2 text-teal-600 transition w-16">
            <div class="bg-teal-50 p-1.5 rounded-xl mb-1"><i class="fas fa-layer-group text-lg"></i></div>
            <span class="text-[10px] font-black">Program</span>
        </a>
        <a href="donasi.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-teal-600 transition w-16">
            <div class="p-1.5 mb-1"><i class="fas fa-receipt text-lg"></i></div>
            <span class="text-[10px] font-bold">Laporan</span>
        </a>
        <a href="panduan.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-teal-600 transition w-16">
            <div class="p-1.5 mb-1"><i class="fas fa-book-open text-lg"></i></div>
            <span class="text-[10px] font-bold">Panduan</span>
        </a>
    </nav>

    <script>
        // MASUKKAN URL WEB APP KAMU DI SINI
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbxlsnAeKUnicG1J_JHH576byKCejUtA5TqX3tAKWtoJz7Fw1VetPE8dpNjkrc8zqkJn/exec';

        window.onload = function() {
            const container = document.getElementById('list-semua-program');
            const formatRp = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });

            fetch(`${scriptUrl}?action=getProgram`)
                .then(res => res.json())
                .then(data => {
                    // Filter hanya program yang statusnya "Aktif"
                    const aktif = data.filter(p => p.status === 'Aktif');
                    container.innerHTML = ''; 

                    if(aktif.length === 0) {
                        container.innerHTML = '<div class="col-span-2 text-center py-10"><p class="text-xs text-slate-400 font-medium">Belum ada program infaq saat ini.</p></div>';
                        return;
                    }

                    // Render seluruh program ke dalam grid Premium
                    aktif.forEach(p => {
                        const persen = Math.min((p.terkumpul / p.target) * 100, 100);
                        const terkumpulRp = formatRp.format(p.terkumpul);
                        const targetRp = formatRp.format(p.target);
                        
                        // Refined Card UI: Glassmorphism Percentage, Cover Image, Professional Button
                        container.innerHTML += `
                            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden flex flex-col group hover:border-teal-400 hover:shadow-lg transition-all duration-300">
                                <div class="h-32 bg-slate-100 relative overflow-hidden shadow-inner">
                                    <div class="absolute top-2.5 right-2.5 bg-black/50 backdrop-blur-sm text-white text-[9px] font-extrabold px-2.5 py-1 rounded-full z-10 shadow-sm border border-white/10">
                                        ${Math.round(persen)}%
                                    </div>
                                    <img src="https://lh3.googleusercontent.com/d/$${p.foto}" onerror="this.src='https://drive.google.com/thumbnail?id=${p.foto}&sz=w500'" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                                </div>
                                <div class="p-4 flex flex-col flex-grow space-y-3.5">
                                    <h4 class="text-xs font-extrabold text-slate-800 leading-tight line-clamp-2 min-h-[32px] group-hover:text-teal-800">${p.nama}</h4>
                                    
                                    <div class="mt-auto space-y-3.5">
                                        <div>
                                            <div class="flex justify-between text-[9px] font-extrabold mb-1.5">
                                                <span class="text-teal-600">${terkumpulRp}</span>
                                                <span class="text-slate-400">Target ${targetRp}</span>
                                            </div>
                                            <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                                                <div class="bg-gradient-to-r from-teal-400 to-teal-500 h-full rounded-full" style="width: ${persen}%"></div>
                                            </div>
                                        </div>
                                        
                                        <a href="infaq.html?name=${encodeURIComponent(p.nama)}" class="block w-full text-center bg-teal-50 text-teal-700 hover:bg-teal-600 hover:text-white font-extrabold py-3 rounded-xl text-[10px] transition-all duration-300 shadow-sm group-hover:shadow-teal-100">
                                            Donasi Sekarang
                                        </a>
                                    </div>
                                </div>
                            </div>`;
                    });
                }).catch(err => {
                    container.innerHTML = '<div class="col-span-2 text-center py-10"><p class="text-xs text-red-400 font-bold">Gagal memuat database program.</p></div>';
                });
        };
    </script>
</body>
</html>
