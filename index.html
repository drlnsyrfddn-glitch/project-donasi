<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infaq Bersama - Beranda Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        ::-webkit-scrollbar { display: none; }
        .pb-safe-nav { padding-bottom: 120px; }
        
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .loading-skeleton { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative flex flex-col">
    
    <div class="w-full overflow-hidden">
        <img src="assets/img/header.webp" alt="Header Infaq" class="w-full h-auto object-cover shadow-sm">
    </div>

    <header class="bg-white px-5 pt-5 pb-6 rounded-b-[35px] shadow-sm border-b border-gray-100 sticky top-0 z-40">
        <div class="flex justify-between items-center mb-5">
            <div>
                <p id="tanggal-sekarang" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Memuat...</p>
                <h1 class="text-xl font-extrabold tracking-tight text-slate-900">Infaq Bersama</h1>
            </div>
            <div class="bg-teal-50 px-3.5 py-2 rounded-full border border-teal-100 backdrop-blur-sm shadow-inner">
                <span id="waktu-sekarang" class="text-xs font-bold text-teal-700">00:00</span>
            </div>
        </div>

        <div class="bg-gradient-to-br from-teal-600 to-emerald-800 p-6 rounded-3xl shadow-[0_15px_30px_-10px_rgba(13,148,136,0.35)] relative overflow-hidden">
            <div class="relative z-10 text-white">
                <p class="text-[10px] font-bold text-teal-100 uppercase tracking-widest mb-1.5 opacity-80">Total Infaq Terkumpul</p>
                <h2 class="text-3xl font-black tracking-tighter" id="total-kas">Rp 0</h2>
            </div>
            <div class="absolute -bottom-6 -right-6 w-32 h-32 bg-white opacity-5 rounded-full blur-2xl"></div>
            <i class="fas fa-wallet absolute -bottom-4 -right-4 text-8xl text-white opacity-[0.05]"></i>
        </div>
    </header>

    <main class="px-5 mt-7 flex-grow pb-safe-nav space-y-7">
        <div class="grid grid-cols-2 gap-3.5">
            <a href="program.html" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center justify-center gap-3 hover:border-teal-500 hover:shadow-lg transition-all duration-300 group">
                <div class="w-12 h-12 bg-teal-50 rounded-2xl flex items-center justify-center text-teal-600 group-hover:bg-teal-500 group-hover:text-white transition-colors">
                    <i class="fas fa-hand-holding-heart text-xl"></i>
                </div>
                <span class="text-xs font-extrabold text-slate-700 group-hover:text-teal-700">Mulai Donasi</span>
            </a>
            <a href="donasi.html" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center justify-center gap-3 hover:border-amber-500 hover:shadow-lg transition-all duration-300 group">
                <div class="w-12 h-12 bg-amber-50 rounded-2xl flex items-center justify-center text-amber-500 group-hover:bg-amber-500 group-hover:text-white transition-colors">
                    <i class="fas fa-chart-pie text-xl"></i>
                </div>
                <span class="text-xs font-extrabold text-slate-700 group-hover:text-amber-700">Laporan</span>
            </a>
        </div>

        <div>
            <div class="mb-4 flex justify-between items-center px-1">
                <h3 class="font-extrabold text-slate-900 text-sm tracking-tight">Program Berjalan</h3>
                <a href="program.html" class="text-[11px] font-bold text-teal-600 hover:text-teal-700 flex items-center gap-1">
                    Lihat Semua <i class="fas fa-chevron-right text-[9px]"></i>
                </a>
            </div>

            <div class="space-y-4" id="list-program-beranda">
                <div class="bg-white rounded-3xl p-4 flex gap-4 loading-skeleton border border-slate-100 shadow-sm">
                    <div class="w-24 h-24 bg-slate-200 rounded-2xl"></div>
                    <div class="flex-grow space-y-3 mt-1">
                        <div class="h-4 bg-slate-200 rounded-full w-3/4"></div>
                        <div class="h-3 bg-slate-200 rounded-full w-1/2"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="pt-2 pb-3 text-center opacity-60">
            <p class="text-[9px] text-slate-400 tracking-[0.2em] font-black uppercase mb-1">
                © 2026 FOUNDERLAN SYSTEMS
            </p>
            <p class="text-[9px] text-slate-400 font-medium italic">
                Building Foundation, Empowering Ummah.
            </p>
        </div>
    </main>

    <nav class="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-md bg-white/95 backdrop-blur-md border-t border-gray-100 flex justify-around items-center pt-2 pb-5 px-4 z-50 rounded-t-[32px] shadow-[0_-10px_40px_-10px_rgba(0,0,0,0.08)]">
        <a href="index.html" class="flex flex-col items-center p-2 text-teal-600 transition w-16">
            <div class="bg-teal-50 p-1.5 rounded-xl mb-1"><i class="fas fa-home text-lg"></i></div>
            <span class="text-[10px] font-black">Beranda</span>
        </a>
        <a href="program.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-teal-600 transition w-16">
            <div class="p-1.5 mb-1"><i class="fas fa-layer-group text-lg"></i></div>
            <span class="text-[10px] font-bold">Program</span>
        </a>
        <a href="donasi.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-teal-600 transition w-16">
            <div class="p-1.5 mb-1"><i class="fas fa-receipt text-lg"></i></div>
            <span class="text-[10px] font-bold">Laporan</span>
        </a>
        <a href="panduan.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-teal-600 transition w-16">
            <div class="p-1.5 mb-1"><i class="fas fa-book-open text-lg"></i></div>
            <span class="text-[10px] font-bold">Panduan</span>
        </a>
    </nav>

    <script>
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbxlsnAeKUnicG1J_JHH576byKCejUtA5TqX3tAKWtoJz7Fw1VetPE8dpNjkrc8zqkJn/exec';

        window.onload = function() {
            updateClock(); setInterval(updateClock, 1000);
            const elTotal = document.getElementById('total-kas');
            const container = document.getElementById('list-program-beranda');
            const formatRp = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });

            fetch(`${scriptUrl}?action=getProgram`)
                .then(res => res.json())
                .then(data => {
                    const aktif = data.filter(p => p.status === 'Aktif').sort((a,b) => a.target - b.target);
                    const totalKas = aktif.reduce((sum, p) => sum + Number(p.terkumpul), 0);
                    elTotal.innerText = formatRp.format(totalKas);

                    container.innerHTML = ''; 
                    if(aktif.length === 0) {
                        container.innerHTML = '<p class="text-center text-xs text-slate-400 py-6 font-medium">Belum ada program berjalan.</p>';
                        return;
                    }

                    aktif.slice(0, 4).forEach(p => {
                        const persen = Math.min((p.terkumpul / p.target) * 100, 100);
                        const targetRp = formatRp.format(p.target);
                        // 2. DATA TERKUMPUL (UPDATE TERBARU)
                        const terkumpulRp = formatRp.format(p.terkumpul);
                        
                        container.innerHTML += `
                            <a href="infaq.html?name=${encodeURIComponent(p.nama)}" class="flex bg-white rounded-3xl shadow-sm border border-slate-100 p-3.5 group hover:border-teal-400 hover:shadow-md transition-all duration-300 items-center gap-4">
                                <div class="w-24 h-24 rounded-2xl overflow-hidden flex-shrink-0 bg-slate-100 relative shadow-inner">
                                    <img src="https://lh3.googleusercontent.com/d/$${p.foto}" onerror="this.src='https://drive.google.com/thumbnail?id=${p.foto}&sz=w500'" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                                </div>
                                <div class="flex-grow flex flex-col justify-center">
                                    <h4 class="text-[13px] font-extrabold text-slate-800 leading-tight mb-1 line-clamp-2 group-hover:text-teal-800">${p.nama}</h4>
                                    <p class="text-[11px] text-teal-600 font-bold mb-0.5">Target: ${targetRp}</p>
                                    <p class="text-[11px] text-slate-500 font-semibold mb-3">Terkumpul: ${terkumpulRp}</p>
                                    
                                    <div class="flex items-center gap-2">
                                        <div class="flex-grow bg-slate-100 h-1.5 rounded-full overflow-hidden">
                                            <div class="bg-gradient-to-r from-teal-400 to-teal-500 h-full rounded-full" style="width: ${persen}%"></div>
                                        </div>
                                        <span class="text-[10px] font-bold text-slate-400 whitespace-nowrap">${Math.round(persen)}%</span>
                                    </div>
                                </div>
                            </a>`;
                    });
                }).catch(err => {
                    elTotal.innerText = "Error Rp";
                    container.innerHTML = '<p class="text-center text-xs text-red-400 py-6 font-bold">Gagal memuat data.</p>';
                });
        };

        function updateClock() {
            const now = new Date();
            document.getElementById('tanggal-sekarang').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('waktu-sekarang').innerText = now.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
        }
    </script>
</body>
</html>
